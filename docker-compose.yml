services:
  app:
    # лЎңм»¬: DockerfileлЎң л№Ңл“ң / мҡҙмҳҒ: DOCKER_IMAGE(GHCR)лЎң pull
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/jae-yon/fam-archive:latest
    container_name: fam_archive
    # нҸ¬нҠё л§Өн•‘
    ports:
      - "${PORT:-2000}:2000"
    # нҷҳкІҪ ліҖмҲҳ нҢҢмқј
    env_file:
      - .env
    environment:
      # Container must reach host MySQL; entrypoint rebuilds DATABASE_URL from these
      - DATABASE_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${DOCKER_UPLOADS_PATH:-./uploads}:/uploads"
    restart: unless-stopped