services:
  app:
    # лЎңм»¬: DockerfileлЎң л№Ңл“ң / мҡҙмҳҒ: DOCKER_IMAGE(GHCR)лЎң pull
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-fam_archive:latest}
    container_name: fam_archive
    # нҸ¬нҠё л§Өн•‘
    ports:
      - "${PORT:-2000}:2000"
    # нҷҳкІҪ ліҖмҲҳ нҢҢмқј
    env_file:
      - .env
    environment:
      - DATABASE_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${DOCKER_UPLOAD_PATH:-./uploads}:/uploads"
    restart: unless-stopped