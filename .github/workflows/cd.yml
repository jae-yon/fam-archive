name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    # 권한 설정
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # GHCR에 로그인
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 메타데이터 추출
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # 빌드 및 푸시
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy Docker Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          script: |
            echo "🚀 Deploying application..."

            if [ ! -d ${{ secrets.UPLOADS_PATH }} ]; then
              mkdir -p ${{ secrets.UPLOADS_PATH }} 
            fi

            cd ${{ secrets.DEPLOY_PATH }}

            echo "📂 Current directory: $(pwd)"

            echo "🔑 Creating .env file..." 

            cat > ${{ secrets.DEPLOY_PATH }}/.env << EOF

            DATABASE_PORT=${{ secrets.DATABASE_PORT }}
            DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}

            DATABASE_URL=${{ secrets.DATABASE_URL }}

            UPLOADS_PATH="/uploads"
            DOCKER_UPLOADS_PATH=${{ secrets.UPLOADS_PATH }}

            EOF
            chmod 600 ${{ secrets.DEPLOY_PATH }}/.env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            docker compose pull

            # Entrypoint runs `prisma migrate deploy` before starting the app
            
            docker compose up -d --build

            echo "🧹 Pruning unused Docker images..."
            docker image prune -af --filter "until=24h" || true

            echo "⏳ Waiting for migrate + app start..."
            sleep 25

            echo "🐳 Docker containers:"
            docker compose ps

            if ! docker compose ps --status running | grep -q fam_archive; then
              echo "❌ Container is not running. Recent logs:"
              docker compose logs --tail=100 app
              exit 1
            fi

            echo "📜 Recent app logs (includes migrate output):"
            docker compose logs --tail=50 app

            echo "✅ Deployment completed successfully!"
