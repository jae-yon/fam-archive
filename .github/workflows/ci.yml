name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: mysql://ci:ci@localhost:3306/famchive
      DATABASE_HOST: localhost
      DATABASE_USER: ci
      DATABASE_PASSWORD: ci
      DATABASE_NAME: famchive
      UPLOAD_PATH: /tmp/uploads

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
