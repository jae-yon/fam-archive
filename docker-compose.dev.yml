services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-fam_archive:latest}
    container_name: fam_archive
    # 포트 매핑
    ports:
      - "${PORT:-2000}:2000"
    # 환경 변수 파일
    env_file:
      - .env
    environment:
      # Container must reach host MySQL; entrypoint rebuilds DATABASE_URL from these
      - DATABASE_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${DOCKER_UPLOADS_PATH:-./uploads}:/uploads"
    restart: unless-stopped